<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todo list</title>
</head>
<body>

  <div class="board">
    <h1>todo list</h1>
    <input class="todo-input js-todo-input" type="text" placeholder="Thing to do">
    <input class="date-input js-date-input" type="date">
    <button class="add-button js-add-button">add</button>
    <div class="todo-list js-todo-list">
        <div class="todo-container js-todo-container-${item.id}" data-todo-id = "${item.id}">
            <p class="todo">pintos</p>
            <p class="date">10/10/2006</p>
            <button class="js-remove-button" data-todo-to-delete-id = "${item.id}">
                remove
            </button>
        </div>
        <div class="todo-container js-todo-container-${item.id}" data-todo-id = "${item.id}">
            <p class="todo">pintos</p>
            <p class="date">10/10/2006</p>
            <button class="js-remove-button" data-todo-to-delete-id = "${item.id}">
                remove
            </button>
        </div>
      </div>
  </div>
   <script type="module" src="script.js"></script>
</body>
</html>
